<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NanoManga Pro - AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --paper: #ffffff;
        --ink: #000000;
        --screentone: #e5e7eb;
        --accent-yellow: #facc15;
        --accent-pink: #fb7185;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--paper);
        color: var(--ink);
        overflow: hidden;
      }
      
      .font-comic {
        font-family: 'Bangers', system-ui, cursive;
        letter-spacing: 0.05em;
      }

      /* --- MANGA TEXTURES --- */
      
      /* Standard Ben-Day Dots */
      .bg-dots {
        background-color: #ffffff;
        background-image: radial-gradient(#000000 15%, transparent 16%);
        background-size: 8px 8px;
        opacity: 1;
      }
      
      .bg-dots-sm {
        background-image: radial-gradient(#000000 15%, transparent 16%);
        background-size: 4px 4px;
      }

      /* Diagonal Speed Lines */
      .bg-speed-lines {
        background: repeating-linear-gradient(
          45deg,
          transparent,
          transparent 10px,
          rgba(0, 0, 0, 0.05) 10px,
          rgba(0, 0, 0, 0.05) 20px
        );
      }

      /* --- INK STYLES --- */

      /* Heavy Ink Border */
      .border-ink {
        border: 3px solid var(--ink);
      }
      
      .border-ink-sm {
        border: 2px solid var(--ink);
      }

      /* Block Shadow (Comic style pop-out) */
      .shadow-comic {
        box-shadow: 4px 4px 0px var(--ink);
      }
      
      .shadow-comic-lg {
        box-shadow: 8px 8px 0px var(--ink);
      }
      
      .shadow-comic-hover:hover {
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0px var(--ink);
      }
      
      .shadow-comic-active:active {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0px var(--ink);
      }

      /* --- UTILS --- */
      
      /* Jagged Edges for Panels */
      .clip-jagged {
        clip-path: polygon(
          0% 0%, 100% 0%, 100% 100%, 
          95% 98%, 90% 100%, 85% 98%, 80% 100%, 75% 98%, 70% 100%, 
          65% 98%, 60% 100%, 55% 98%, 50% 100%, 45% 98%, 40% 100%, 
          35% 98%, 30% 100%, 25% 98%, 20% 100%, 15% 98%, 10% 100%, 
          5% 98%, 0% 100%
        );
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #fff;
        border-left: 2px solid #000;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #000;
        border: 2px solid #fff;
      }

      /* Animations */
      @keyframes shake {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-1deg); }
        75% { transform: rotate(1deg); }
      }
      .animate-shake {
        animation: shake 0.2s ease-in-out infinite;
      }
      
      @keyframes pop-in {
        0% { opacity: 0; transform: scale(0.9); }
        70% { transform: scale(1.05); }
        100% { opacity: 1; transform: scale(1); }
      }
      .animate-pop {
        animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
